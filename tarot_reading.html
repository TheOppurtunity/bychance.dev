<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarot Card Reader</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0b14;
      --surface: #16121f;
      --surface2: #1e1829;
      --border: rgba(180,150,255,0.12);
      --border2: rgba(180,150,255,0.22);
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --violet: #9b7fe8;
      --violet-light: #c4adff;
      --text: #e8e0f0;
      --text-muted: #9589a8;
      --text-dim: #5c5270;
      --danger: #e07070;
      --danger-bg: rgba(224,112,112,0.12);
    }

    /* ── Site nav ── */
    .site-nav {
      width: 100%;
      background: rgba(14,11,20,0.97);
      border-bottom: 1px solid rgba(180,150,255,0.15);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: relative;
      z-index: 2;
    }
    .back-link {
      color: var(--gold);
      text-decoration: none;
      font-size: 0.82rem;
      font-family: 'Cinzel', serif;
      letter-spacing: 0.08em;
    }
    .back-link:hover { color: var(--gold-light); text-decoration: underline; }
    .site-nav-title { font-size: 1rem; color: var(--text); font-family: 'Cinzel', serif; letter-spacing: 0.05em; }
    .site-nav-sub { font-size: 0.78rem; color: var(--text-muted); font-style: italic; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Pro', Georgia, serif;
      font-size: 17px;
      line-height: 1.6;
      min-height: 100vh;
    }
    /* Starfield background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 73% 8%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 42% 55%, rgba(255,255,255,0.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 88% 38%, rgba(255,255,255,0.35) 0%, transparent 100%),
        radial-gradient(1px 1px at 5% 80%, rgba(255,255,255,0.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 90%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 70%, rgba(255,255,255,0.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 92% 65%, rgba(255,255,255,0.25) 0%, transparent 100%),
        radial-gradient(2px 2px at 50% 30%, rgba(200,168,255,0.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 20% 45%, rgba(255,255,255,0.15) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }
    .container {
      position: relative;
      z-index: 1;
      max-width: 820px;
      margin: 0 auto;
      padding: 3rem 2rem 4rem;
    }
    header {
      text-align: center;
      margin-bottom: 3rem;
    }
    .eye-symbol {
      font-size: 2rem;
      margin-bottom: 0.75rem;
      display: block;
      filter: drop-shadow(0 0 8px rgba(155,127,232,0.5));
    }
    h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 600;
      letter-spacing: 0.15em;
      color: var(--gold-light);
      text-shadow: 0 0 30px rgba(201,168,76,0.3);
      margin-bottom: 0.4rem;
    }
    .subtitle {
      font-size: 1rem;
      color: var(--text-muted);
      font-style: italic;
      letter-spacing: 0.04em;
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 2rem 0;
      color: var(--text-dim);
      font-size: 0.85rem;
      letter-spacing: 0.12em;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border2), transparent);
    }
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }
    .controls label {
      font-size: 0.9rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      font-family: 'Cinzel', serif;
    }
    input[type=number] {
      width: 72px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 6px;
      color: var(--text);
      font-size: 1rem;
      padding: 8px 12px;
      font-family: 'Crimson Pro', serif;
      outline: none;
      transition: border-color 0.2s;
      -moz-appearance: textfield;
    }
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    input[type=number]:focus { border-color: var(--violet); }
    .draw-btn {
      padding: 9px 28px;
      background: transparent;
      border: 1px solid var(--gold);
      border-radius: 6px;
      color: var(--gold-light);
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s, color 0.2s;
    }
    .draw-btn:hover {
      background: rgba(201,168,76,0.08);
      box-shadow: 0 0 16px rgba(201,168,76,0.2);
      color: var(--gold-light);
    }
    .draw-btn:active { transform: scale(0.97); }
    .hint {
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-dim);
      font-style: italic;
      margin-bottom: 2rem;
    }

    /* Cards */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.25rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.4rem 1.25rem;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.4s ease both;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      border-color: var(--violet);
      box-shadow: 0 0 20px rgba(155,127,232,0.15);
    }
    .card.inverted-card:hover {
      border-color: var(--danger);
      box-shadow: 0 0 20px rgba(224,112,112,0.15);
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--violet), transparent);
      opacity: 0.6;
    }
    .card.inverted-card::before {
      background: linear-gradient(90deg, transparent, var(--danger), transparent);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card-pos {
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }
    .card-name {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
      margin-bottom: 0.25rem;
    }
    .card-meta {
      font-size: 0.82rem;
      color: var(--text-dim);
      margin-bottom: 0.75rem;
    }
    .inverted-badge {
      display: inline-block;
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      padding: 3px 10px;
      border-radius: 4px;
      background: var(--danger-bg);
      color: var(--danger);
      border: 1px solid rgba(224,112,112,0.2);
    }
    .upright-badge {
      display: inline-block;
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      padding: 3px 10px;
      border-radius: 4px;
      background: rgba(155,127,232,0.1);
      color: var(--violet-light);
      border: 1px solid rgba(155,127,232,0.2);
    }
    .hover-hint {
      font-size: 0.72rem;
      color: var(--text-dim);
      font-style: italic;
      margin-top: 0.6rem;
    }

    /* Full deck list */
    .section-label {
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      letter-spacing: 0.16em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .suit-group { margin-bottom: 2rem; }
    .deck-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 3px;
    }
    .deck-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 5px 8px;
      border-radius: 5px;
      transition: background 0.15s;
      font-size: 0.9rem;
    }
    .deck-row:hover { background: var(--surface2); }
    .deck-num {
      color: var(--text-dim);
      font-size: 0.8rem;
      min-width: 26px;
      font-variant-numeric: tabular-nums;
    }
    .deck-name { color: var(--text); }
    .error-msg {
      text-align: center;
      color: var(--danger);
      font-style: italic;
      padding: 1rem;
    }

    /* ── Meaning popup ── */
    .tarot-popup {
      position: fixed;
      z-index: 9999;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 16px;
      width: min(88vw, 520px);
      max-height: 75vh;
      overflow-y: auto;
      pointer-events: none;
      box-shadow: 0 30px 100px rgba(0,0,0,0.95), 0 0 40px rgba(155,127,232,0.08);
      display: none;
    }
    .tarot-popup::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      border-radius: 16px 16px 0 0;
      background: linear-gradient(90deg, transparent, var(--violet), transparent);
    }
    .tarot-popup.inverted-popup::before {
      background: linear-gradient(90deg, transparent, var(--danger), transparent);
    }
    .popup-inner {
      padding: 2rem 2rem 1.75rem;
    }
    .popup-card-suit {
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      letter-spacing: 0.16em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    .popup-card-name {
      font-family: 'Cinzel', serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--gold-light);
      line-height: 1.2;
      margin-bottom: 0.6rem;
      text-shadow: 0 0 20px rgba(201,168,76,0.2);
    }
    .popup-badge-wrap { margin-bottom: 1.25rem; }
    .popup-divider {
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border2), transparent);
      margin: 1.25rem 0;
    }
    .popup-orientation-label {
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 0.6rem;
    }
    .popup-meaning {
      font-size: 0.98rem;
      color: var(--text-muted);
      line-height: 1.75;
      font-style: italic;
    }

    @media (max-width: 500px) {
      .container { padding: 2rem 1rem 3rem; }
      .cards-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

  "Six of Wands":        { upright: "Six of Wands — upright meaning coming soon.", inverted: "Six of Wands — inverted meaning coming soon." },
  "Seven of Wands":      { upright: "Seven of Wands — upright meaning coming soon.", inverted: "Seven of Wands — inverted meaning coming soon." },
  "Eight of Wands":      { upright: "Eight of Wands — upright meaning coming soon.", inverted: "Eight of Wands — inverted meaning coming soon." },
  "Nine of Wands":       { upright: "Nine of Wands — upright meaning coming soon.", inverted: "Nine of Wands — inverted meaning coming soon." },
  "Ten of Wands":        { upright: "Ten of Wands — upright meaning coming soon.", inverted: "Ten of Wands — inverted meaning coming soon." },
  "Page of Wands":       { upright: "Page of Wands — upright meaning coming soon.", inverted: "Page of Wands — inverted meaning coming soon." },
  "Knight of Wands":     { upright: "Knight of Wands — upright meaning coming soon.", inverted: "Knight of Wands — inverted meaning coming soon." },
  "Queen of Wands":      { upright: "Queen of Wands — upright meaning coming soon.", inverted: "Queen of Wands — inverted meaning coming soon." },
  "King of Wands":       { upright: "King of Wands — upright meaning coming soon.", inverted: "King of Wands — inverted meaning coming soon." },
};

// ── Deck ─────────────────────────────────────────────────────────────────────
const MAJOR = [
  "The Fool","The Magician","The High Priestess","The Empress","The Emperor",
  "The Hierophant","The Lovers","The Chariot","Strength","The Hermit",
  "Wheel of Fortune","Justice","The Hanged Man","Death","Temperance",
  "The Devil","The Tower","The Star","The Moon","The Sun","Judgement","The World"
];
function buildMinor(suit, offset) {
  const ranks = ["Ace","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten","Page","Knight","Queen","King"];
  return ranks.map((r, i) => ({ name: `${r} of ${suit}`, suit, num: offset + i + 1 }));
}
const DECK = [
  ...MAJOR.map((name, i) => ({ name, suit: "Major Arcana", num: i + 1 })),
  ...buildMinor("Cups", 22),
  ...buildMinor("Pentacles", 36),
  ...buildMinor("Swords", 50),
  ...buildMinor("Wands", 64),
];
const ORDINALS = n => {
  if (n >= 11 && n <= 13) return n + "th";
  const s = ["th","st","nd","rd"];
  return n + (s[n % 10] || s[0]);
};

// ── Popup ─────────────────────────────────────────────────────────────────────
function showPopup(name, suit, isInverted) {
  const meanings = MEANINGS[name] || { upright: name, inverted: name };
  const popup = document.getElementById('tarot-popup');
  document.getElementById('popup-suit').textContent = suit;
  document.getElementById('popup-name').textContent = name;
  document.getElementById('popup-badge').innerHTML = isInverted
    ? '<span class="inverted-badge">Inverted</span>'
    : '<span class="upright-badge">Upright</span>';
  document.getElementById('popup-orientation-label').textContent = isInverted ? 'Inverted Meaning' : 'Upright Meaning';
  document.getElementById('popup-meaning').textContent = isInverted ? meanings.inverted : meanings.upright;
  popup.classList.toggle('inverted-popup', isInverted);
  popup.style.display = 'block';
  document.getElementById('popup-overlay').style.display = 'block';
}
function hidePopup() {
  document.getElementById('tarot-popup').style.display = 'none';
  document.getElementById('popup-overlay').style.display = 'none';
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function draw() {
  const n = parseInt(document.getElementById("num-cards").value);
  const out = document.getElementById("output");
  hidePopup();

  if (isNaN(n) || n < 0 || n > 78) {
    out.innerHTML = '<p class="error-msg">Please enter a number between 0 and 78.</p>';
    return;
  }
  if (n === 0) {
    const suits = ["Major Arcana","Cups","Pentacles","Swords","Wands"];
    let html = '';
    suits.forEach(suit => {
      const cards = DECK.filter(c => c.suit === suit);
      html += `<div class="suit-group"><p class="section-label">${suit}</p><div class="deck-list">`;
      cards.forEach(c => {
        html += `<div class="deck-row"><span class="deck-num">${c.num}</span><span class="deck-name">${c.name}</span></div>`;
      });
      html += `</div></div>`;
    });
    out.innerHTML = html;
    return;
  }

  const pool = [...Array(78).keys()];
  const drawn = [];
  while (drawn.length < n) {
    const idx = Math.floor(Math.random() * pool.length);
    drawn.push(pool.splice(idx, 1)[0]);
  }

  let html = '<div class="cards-grid">';
  drawn.forEach((idx, i) => {
    const card = DECK[idx];
    const inverted = Math.round(Math.random()) === 1;
    const delay = (i * 80) + "ms";
    const badge = inverted
      ? '<span class="inverted-badge">Inverted</span>'
      : '<span class="upright-badge">Upright</span>';
    html += `
      <div class="card ${inverted ? 'inverted-card' : ''}" style="animation-delay:${delay}"
           data-name="${card.name}" data-suit="${card.suit}" data-inverted="${inverted}">
        <div class="card-pos">${ORDINALS(i+1)} card</div>
        <div class="card-name">${card.name}</div>
        <div class="card-meta">Card #${card.num} &middot; ${card.suit}</div>
        ${badge}
        <p class="hover-hint">Hover to reveal meaning</p>
      </div>`;
  });
  html += '</div>';
  out.innerHTML = html;

  // Wire up hover listeners
  document.querySelectorAll('.card[data-name]').forEach(el => {
    el.addEventListener('mouseenter', () => {
      showPopup(el.dataset.name, el.dataset.suit, el.dataset.inverted === 'true');
    });
    el.addEventListener('mouseleave', hidePopup);
  });
}

draw();
</script>
</body>
</html>
