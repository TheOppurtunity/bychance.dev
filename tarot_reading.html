<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarot Card Reader</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0b14;
      --surface: #16121f;
      --surface2: #1e1829;
      --border: rgba(180,150,255,0.12);
      --border2: rgba(180,150,255,0.22);
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --violet: #9b7fe8;
      --violet-light: #c4adff;
      --text: #e8e0f0;
      --text-muted: #9589a8;
      --text-dim: #5c5270;
      --danger: #e07070;
      --danger-bg: rgba(224,112,112,0.12);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Pro', Georgia, serif;
      font-size: 17px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Starfield background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 73% 8%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 42% 55%, rgba(255,255,255,0.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 88% 38%, rgba(255,255,255,0.35) 0%, transparent 100%),
        radial-gradient(1px 1px at 5% 80%, rgba(255,255,255,0.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 90%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 70%, rgba(255,255,255,0.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 92% 65%, rgba(255,255,255,0.25) 0%, transparent 100%),
        radial-gradient(2px 2px at 50% 30%, rgba(200,168,255,0.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 20% 45%, rgba(255,255,255,0.15) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 820px;
      margin: 0 auto;
      padding: 3rem 2rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .eye-symbol {
      font-size: 2rem;
      margin-bottom: 0.75rem;
      display: block;
      filter: drop-shadow(0 0 8px rgba(155,127,232,0.5));
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 600;
      letter-spacing: 0.15em;
      color: var(--gold-light);
      text-shadow: 0 0 30px rgba(201,168,76,0.3);
      margin-bottom: 0.4rem;
    }

    .subtitle {
      font-size: 1rem;
      color: var(--text-muted);
      font-style: italic;
      letter-spacing: 0.04em;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 2rem 0;
      color: var(--text-dim);
      font-size: 0.85rem;
      letter-spacing: 0.12em;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border2), transparent);
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .controls label {
      font-size: 0.9rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      font-family: 'Cinzel', serif;
    }

    input[type=number] {
      width: 72px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 6px;
      color: var(--text);
      font-size: 1rem;
      padding: 8px 12px;
      font-family: 'Crimson Pro', serif;
      outline: none;
      transition: border-color 0.2s;
      -moz-appearance: textfield;
    }
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    input[type=number]:focus { border-color: var(--violet); }

    .draw-btn {
      padding: 9px 28px;
      background: transparent;
      border: 1px solid var(--gold);
      border-radius: 6px;
      color: var(--gold-light);
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s, color 0.2s;
    }
    .draw-btn:hover {
      background: rgba(201,168,76,0.08);
      box-shadow: 0 0 16px rgba(201,168,76,0.2);
      color: var(--gold-light);
    }
    .draw-btn:active { transform: scale(0.97); }

    .hint {
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-dim);
      font-style: italic;
      margin-bottom: 2rem;
    }

    /* Cards */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.25rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.4rem 1.25rem;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.4s ease both;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--violet), transparent);
      opacity: 0.6;
    }
    .card.inverted-card::before {
      background: linear-gradient(90deg, transparent, var(--danger), transparent);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-pos {
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    .card-glyph {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      display: block;
    }

    .card-name {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
      margin-bottom: 0.25rem;
    }

    .card-meta {
      font-size: 0.82rem;
      color: var(--text-dim);
      margin-bottom: 0.75rem;
    }

    .inverted-badge {
      display: inline-block;
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      padding: 3px 10px;
      border-radius: 4px;
      background: var(--danger-bg);
      color: var(--danger);
      border: 1px solid rgba(224,112,112,0.2);
    }

    .upright-badge {
      display: inline-block;
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      padding: 3px 10px;
      border-radius: 4px;
      background: rgba(155,127,232,0.1);
      color: var(--violet-light);
      border: 1px solid rgba(155,127,232,0.2);
    }

    /* Full deck list */
    .section-label {
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      letter-spacing: 0.16em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .suit-group { margin-bottom: 2rem; }

    .deck-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 3px;
    }

    .deck-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 5px 8px;
      border-radius: 5px;
      transition: background 0.15s;
      font-size: 0.9rem;
    }
    .deck-row:hover { background: var(--surface2); }

    .deck-num {
      color: var(--text-dim);
      font-size: 0.8rem;
      min-width: 26px;
      font-variant-numeric: tabular-nums;
    }

    .deck-name { color: var(--text); }

    .error-msg {
      text-align: center;
      color: var(--danger);
      font-style: italic;
      padding: 1rem;
    }

    @media (max-width: 500px) {
      .container { padding: 2rem 1rem 3rem; }
      .cards-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <span class="eye-symbol">✦</span>
    <h1>Tarot Card Reader</h1>
    <p class="subtitle">Draw from the 78-card deck &mdash; upright &amp; inverted</p>
  </header>

  <div class="controls">
    <label for="num-cards">Cards to draw</label>
    <input type="number" id="num-cards" min="0" max="78" value="3" />
    <button class="draw-btn" onclick="draw()">Draw the Cards</button>
  </div>
  <p class="hint">Enter 0 to display all 78 cards in order</p>

  <div class="divider">&#10022;</div>

  <div id="output"></div>
</div>

<script>
const SUIT_GLYPHS = { "Major Arcana": "✦", "Cups": "🜄", "Pentacles": "⬠", "Swords": "✦", "Wands": "⁂" };

const MAJOR = [
  "The Fool","The Magician","The High Priestess","The Empress","The Emperor",
  "The Hierophant","The Lovers","The Chariot","Strength","The Hermit",
  "Wheel of Fortune","Justice","The Hanged Man","Death","Temperance",
  "The Devil","The Tower","The Star","The Moon","The Sun","Judgement","The World"
];

function buildMinor(suit, offset) {
  const ranks = ["Ace","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten","Page","Knight","Queen","King"];
  return ranks.map((r, i) => ({ name: `${r} of ${suit}`, suit, num: offset + i + 1 }));
}

const DECK = [
  ...MAJOR.map((name, i) => ({ name, suit: "Major Arcana", num: i + 1 })),
  ...buildMinor("Cups", 22),
  ...buildMinor("Pentacles", 36),
  ...buildMinor("Swords", 50),
  ...buildMinor("Wands", 64),
];

const ORDINALS = n => {
  if (n >= 11 && n <= 13) return n + "th";
  const s = ["th","st","nd","rd"];
  return n + (s[n % 10] || s[0]);
};

function draw() {
  const n = parseInt(document.getElementById("num-cards").value);
  const out = document.getElementById("output");

  if (isNaN(n) || n < 0 || n > 78) {
    out.innerHTML = '<p class="error-msg">Please enter a number between 0 and 78.</p>';
    return;
  }

  if (n === 0) {
    const suits = ["Major Arcana","Cups","Pentacles","Swords","Wands"];
    let html = '';
    suits.forEach(suit => {
      const cards = DECK.filter(c => c.suit === suit);
      html += `<div class="suit-group"><p class="section-label">${suit}</p><div class="deck-list">`;
      cards.forEach(c => {
        html += `<div class="deck-row"><span class="deck-num">${c.num}</span><span class="deck-name">${c.name}</span></div>`;
      });
      html += `</div></div>`;
    });
    out.innerHTML = html;
    return;
  }

  const pool = [...Array(78).keys()];
  const drawn = [];
  while (drawn.length < n) {
    const idx = Math.floor(Math.random() * pool.length);
    drawn.push(pool.splice(idx, 1)[0]);
  }

  let html = '<div class="cards-grid">';
  drawn.forEach((idx, i) => {
    const card = DECK[idx];
    const inverted = Math.round(Math.random()) === 1;
    const delay = (i * 80) + "ms";
    const badge = inverted
      ? '<span class="inverted-badge">Inverted</span>'
      : '<span class="upright-badge">Upright</span>';
    html += `
      <div class="card ${inverted ? 'inverted-card' : ''}" style="animation-delay:${delay}">
        <div class="card-pos">${ORDINALS(i+1)} card</div>
        <div class="card-name">${card.name}</div>
        <div class="card-meta">Card #${card.num} &middot; ${card.suit}</div>
        ${badge}
      </div>`;
  });
  html += '</div>';
  out.innerHTML = html;
}

draw();
</script>
</body>
</html>
