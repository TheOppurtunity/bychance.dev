<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brain Dump — Math Formula Library</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:         #0f1117;
      --surface:    #111827;
      --surface2:   #1f2937;
      --border:     #374151;
      --border-sub: #1f2937;
      --orange:     #f97316;
      --blue:       #3b82f6;
      --text:       #f9fafb;
      --text-muted: #9ca3af;
      --text-dim:   #6b7280;
      --red:        #ef4444;
      --green:      #22c55e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Site Nav ── */
    .site-nav {
      width: 100%;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .back-link { color: var(--orange); text-decoration: none; font-size: 0.82rem; font-weight: 500; flex-shrink: 0; }
    .back-link:hover { text-decoration: underline; }
    .site-nav-title { font-size: 0.95rem; font-weight: 700; color: var(--text); }
    .site-nav-sub   { font-size: 0.78rem; color: var(--text-muted); }
    .nav-spacer { flex: 1; }
    .edit-toggle {
      padding: 6px 14px;
      font-size: 0.78rem;
      font-weight: 600;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .edit-toggle:hover { color: var(--text); border-color: #4b5563; }
    .edit-toggle.active { background: rgba(249,115,22,0.12); border-color: var(--orange); color: var(--orange); }

    /* ── App Shell ── */
    #app {
      max-width: 920px;
      margin: 0 auto;
      padding: 36px 20px 80px;
    }

    /* ── Page heading ── */
    .page-heading { margin-bottom: 28px; }
    .page-title {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.03em;
      margin-bottom: 4px;
    }
    .page-title span { color: var(--orange); }
    .page-subtitle { font-size: 0.88rem; color: var(--text-muted); }

    /* ── Breadcrumb ── */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
      font-size: 0.8rem;
      color: var(--text-dim);
      flex-wrap: wrap;
    }
    .bc-link { color: var(--orange); cursor: pointer; }
    .bc-link:hover { text-decoration: underline; }
    .bc-sep { color: var(--text-dim); }
    .bc-current { color: var(--text); font-weight: 600; }

    /* ── Back button ── */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      font-size: 0.8rem;
      font-weight: 500;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: 22px;
    }
    .back-btn:hover { color: var(--text); border-color: #4b5563; }

    /* ── CLASS GRID ── */
    .class-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 16px;
    }
    .class-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
      position: relative;
    }
    .class-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.45);
      border-color: #4b5563;
    }
    .class-card-header {
      padding: 28px 20px 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100px;
      overflow: hidden;
    }
    .class-card-symbol { color: var(--text); text-align: center; }
    .class-card-symbol .katex { font-size: 1.25em !important; }
    .class-card-body { padding: 12px 16px 16px; }
    .class-card-name { font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .class-card-meta { font-size: 0.74rem; color: var(--text-dim); }

    /* ── TOPIC GRID ── */
    .topic-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 10px;
    }
    .topic-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left-width: 3px;
      border-radius: 10px;
      padding: 16px 16px 16px 18px;
      cursor: pointer;
      transition: background 0.15s, transform 0.12s;
      position: relative;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .topic-card:hover { background: var(--surface2); transform: translateX(3px); }
    .topic-card-body { flex: 1; min-width: 0; }
    .topic-card-name { font-size: 0.93rem; font-weight: 600; color: var(--text); line-height: 1.3; }
    .topic-card-meta { font-size: 0.72rem; color: var(--text-dim); margin-top: 3px; }
    .topic-card-arrow { color: var(--text-dim); font-size: 1rem; flex-shrink: 0; }

    /* ── FORMULA GRID ── */
    .formula-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 16px;
    }
    .formula-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 22px;
      position: relative;
      overflow: hidden;
    }
    .formula-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }
    .formula-card-name {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      margin-bottom: 14px;
    }
    .formula-display {
      overflow-x: auto;
      text-align: center;
      padding: 6px 0 10px;
    }
    .formula-display .katex-display { margin: 0; }
    .formula-card-desc {
      font-size: 0.76rem;
      color: var(--text-dim);
      margin-top: 12px;
      font-style: italic;
      border-top: 1px solid var(--border-sub);
      padding-top: 10px;
      line-height: 1.55;
    }

    /* ── Add card ── */
    .add-card {
      border: 1px dashed var(--border);
      border-radius: 12px;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text-dim);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      padding: 24px;
      transition: all 0.2s;
      min-height: 80px;
    }
    .add-card:hover { border-color: var(--orange); color: var(--orange); background: rgba(249,115,22,0.04); }
    .edit-mode .add-card { display: flex; }

    /* ── Edit overlays ── */
    .card-actions {
      display: none;
      position: absolute;
      top: 8px; right: 8px;
      gap: 4px;
      z-index: 10;
    }
    .edit-mode .card-actions { display: flex; }
    .card-btn {
      width: 26px; height: 26px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem;
      transition: all 0.12s;
    }
    .card-btn:hover { color: var(--text); border-color: #4b5563; }
    .card-btn.del:hover { color: var(--red); border-color: var(--red); background: rgba(239,68,68,0.08); }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.72);
      z-index: 2000;
      align-items: center; justify-content: center;
      padding: 20px;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 32px 80px rgba(0,0,0,0.9);
    }
    .modal h3 { font-size: 1.05rem; font-weight: 700; color: var(--text); margin-bottom: 22px; }
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 0.74rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .form-input, .form-textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 0.9rem;
      padding: 9px 12px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus, .form-textarea:focus { border-color: var(--orange); }
    .form-textarea {
      resize: vertical;
      min-height: 72px;
      font-family: ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace;
      font-size: 0.83rem;
    }
    .form-hint { font-size: 0.71rem; color: var(--text-dim); margin-top: 5px; }
    .latex-preview {
      background: var(--bg);
      border: 1px solid var(--border-sub);
      border-radius: 8px;
      padding: 18px 14px;
      text-align: center;
      min-height: 64px;
      overflow-x: auto;
      margin-top: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .color-palette { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
    .color-swatch {
      width: 28px; height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.1s, border-color 0.1s;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.selected { border-color: var(--text); }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 24px; flex-wrap: wrap; }
    .btn {
      padding: 8px 18px;
      font-size: 0.82rem; font-weight: 600;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn:hover { color: var(--text); border-color: #4b5563; }
    .btn.primary { background: var(--orange); color: #fff; border-color: var(--orange); }
    .btn.primary:hover { background: #ea6c0a; border-color: #ea6c0a; }
    .btn.danger:hover { background: rgba(239,68,68,0.1); border-color: var(--red); color: var(--red); }

    /* ── Responsive ── */
    @media (max-width: 580px) {
      #app { padding: 20px 12px 60px; }
      .formula-grid { grid-template-columns: 1fr; }
      .class-grid { grid-template-columns: 1fr; }
      .topic-grid { grid-template-columns: 1fr; }
      .modal { padding: 20px; }
    }
  </style>
</head>
<body>

<nav class="site-nav">
  <a class="back-link" href="index.html">← bychance.dev</a>
  <span class="site-nav-title">Brain Dump</span>
  <span class="site-nav-sub">Math Formula Library</span>
  <div class="nav-spacer"></div>
  <button class="edit-toggle" id="edit-toggle" onclick="toggleEditMode()">✎ Edit</button>
</nav>

<div id="app"></div>

<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div id="modal-content"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  ACCENT COLORS
// ═══════════════════════════════════════════════════════════════════
const ACCENTS = ['#f97316','#3b82f6','#8b5cf6','#14b8a6','#f59e0b','#f43f5e','#10b981','#ec4899','#6366f1'];

// ═══════════════════════════════════════════════════════════════════
//  DEFAULT DATA  — 6 courses, pre-populated with real formulas
// ═══════════════════════════════════════════════════════════════════
const DEFAULT_DATA = { classes: [

//  STATE
// ═══════════════════════════════════════════════════════════════════
const STORAGE_KEY = 'brain_dump_v1';
let data      = loadData();
let navStack  = [];                              // history for back-button
let nav       = { view:'home', classId:null, topicId:null };
let editMode  = false;

// ═══════════════════════════════════════════════════════════════════
//  PERSISTENCE
// ═══════════════════════════════════════════════════════════════════
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_DATA)); // deep clone
}
function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// ═══════════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════════
function escH(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function genId() { return 'x' + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function renderLatex(latex, display=true) {
  try {
    return katex.renderToString(latex||'', { displayMode:display, throwOnError:false, errorColor:'#ef4444' });
  } catch(e) {
    return `<span style="color:#ef4444;font-size:0.8rem">${escH(latex)}</span>`;
  }
}
function getClass(id) { return data.classes.find(c => c.id === id); }
function getTopic(cls, id) { return cls.topics.find(t => t.id === id); }

// ═══════════════════════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════════════════════
function navigateTo(view, classId=null, topicId=null) {
  navStack.push({ ...nav });
  nav = { view, classId, topicId };
  renderApp();
  window.scrollTo(0, 0);
}
function goBack() {
  if (navStack.length === 0) return;
  nav = navStack.pop();
  renderApp();
  window.scrollTo(0, 0);
}
function toggleEditMode() {
  editMode = !editMode;
  document.getElementById('edit-toggle').classList.toggle('active', editMode);
  document.getElementById('app').classList.toggle('edit-mode', editMode);
}

// ═══════════════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════════════
function renderApp() {
  const el = document.getElementById('app');
  el.classList.toggle('edit-mode', editMode);
  if (nav.view === 'home')  renderHome();
  if (nav.view === 'class') renderClass();
  if (nav.view === 'topic') renderTopic();
}

// ── Home: class grid ─────────────────────────────────────────────
function renderHome() {
  let html = `
    <div class="page-heading">
      <div class="page-title">Brain <span>Dump</span></div>
      <div class="page-subtitle">Select a course to browse formula topics</div>
    </div>
    <div class="class-grid">`;

  data.classes.forEach(cls => {
    html += `
      <div class="class-card" onclick="navigateTo('class','${cls.id}')"
           style="border-color:${cls.accent}30">
        <div class="card-actions">
          <button class="card-btn" title="Edit" onclick="event.stopPropagation();openClassModal('${cls.id}')">✎</button>
          <button class="card-btn del" title="Delete" onclick="event.stopPropagation();deleteClass('${cls.id}')">✕</button>
        </div>
        <div class="class-card-header" style="background:${cls.accent}18">
          <div class="class-card-symbol">${renderLatex(cls.symbol, false)}</div>
        </div>
        <div class="class-card-body" style="border-top:1px solid ${cls.accent}25">
          <div class="class-card-name">${escH(cls.name)}</div>
          <div class="class-card-meta">${cls.topics.length} topic${cls.topics.length!==1?'s':''}</div>
        </div>
      </div>`;
  });

  html += `
      <div class="add-card" onclick="openClassModal()">+ Add Course</div>
    </div>`;

  document.getElementById('app').innerHTML = html;
}

// ── Class: topic grid ────────────────────────────────────────────
function renderClass() {
  const cls = getClass(nav.classId);
  if (!cls) { navigateTo('home'); return; }

  let html = `
    <div class="breadcrumb">
      <span class="bc-link" onclick="navigateTo('home')">All Courses</span>
      <span class="bc-sep">›</span>
      <span class="bc-current">${escH(cls.name)}</span>
    </div>
    <button class="back-btn" onclick="goBack()">← Back</button>
    <div class="page-heading">
      <div class="page-title" style="color:${cls.accent}">${escH(cls.name)}</div>
      <div class="page-subtitle">Choose a topic to see its formulas</div>
    </div>
    <div class="topic-grid">`;

  cls.topics.forEach(topic => {
    html += `
      <div class="topic-card" onclick="navigateTo('topic','${cls.id}','${topic.id}')"
           style="border-left-color:${cls.accent}">
        <div class="card-actions" style="top:6px;right:6px">
          <button class="card-btn" title="Edit" onclick="event.stopPropagation();openTopicModal('${topic.id}')">✎</button>
          <button class="card-btn del" title="Delete" onclick="event.stopPropagation();deleteTopic('${topic.id}')">✕</button>
        </div>
        <div class="topic-card-body">
          <div class="topic-card-name">${escH(topic.name)}</div>
          <div class="topic-card-meta">${topic.formulas.length} formula${topic.formulas.length!==1?'s':''}</div>
        </div>
        <div class="topic-card-arrow">›</div>
      </div>`;
  });

  html += `
      <div class="add-card" onclick="openTopicModal()">+ Add Topic</div>
    </div>`;

  document.getElementById('app').innerHTML = html;
}

// ── Topic: formula cards ─────────────────────────────────────────
function renderTopic() {
  const cls = getClass(nav.classId);
  const topic = cls && getTopic(cls, nav.topicId);
  if (!cls || !topic) { navigateTo('home'); return; }

  let html = `
    <div class="breadcrumb">
      <span class="bc-link" onclick="navigateTo('home')">All Courses</span>
      <span class="bc-sep">›</span>
      <span class="bc-link" onclick="navigateTo('class','${cls.id}')">${escH(cls.name)}</span>
      <span class="bc-sep">›</span>
      <span class="bc-current">${escH(topic.name)}</span>
    </div>
    <button class="back-btn" onclick="goBack()">← Back</button>
    <div class="page-heading">
      <div class="page-title">${escH(topic.name)}</div>
      <div class="page-subtitle">${escH(cls.name)} · ${topic.formulas.length} formula${topic.formulas.length!==1?'s':''}</div>
    </div>
    <div class="formula-grid">`;

  topic.formulas.forEach(f => {
    html += `
      <div class="formula-card" style="--acc:${cls.accent}">
        <div style="position:absolute;top:0;left:0;right:0;height:2px;background:${cls.accent}"></div>
        <div class="card-actions">
          <button class="card-btn" title="Edit" onclick="openFormulaModal('${f.id}')">✎</button>
          <button class="card-btn del" title="Delete" onclick="deleteFormula('${f.id}')">✕</button>
        </div>
        <div class="formula-card-name">${escH(f.name)}</div>
        <div class="formula-display">${renderLatex(f.latex, true)}</div>
        ${f.desc ? `<div class="formula-card-desc">${escH(f.desc)}</div>` : ''}
      </div>`;
  });

  html += `
      <div class="add-card" onclick="openFormulaModal()">+ Add Formula</div>
    </div>`;

  document.getElementById('app').innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════════
//  MODALS
// ═══════════════════════════════════════════════════════════════════
function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}
function showModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('show');
}

// ── Class modal ─────────────────────────────────────────────────
function openClassModal(classId=null) {
  const cls = classId ? getClass(classId) : null;
  const name = cls ? cls.name : '';
  const symbol = cls ? cls.symbol : 'x^2';
  const accent = cls ? cls.accent : ACCENTS[0];

  const swatches = ACCENTS.map(c =>
    `<div class="color-swatch${c===accent?' selected':''}" style="background:${c}"
         onclick="selectSwatch(this,'${c}')"></div>`
  ).join('');

  showModal(`
    <h3>${cls ? 'Edit Course' : 'Add Course'}</h3>
    <div class="form-group">
      <label class="form-label">Course Name</label>
      <input class="form-input" id="cls-name" value="${escH(name)}" placeholder="e.g. Algebra" />
    </div>
    <div class="form-group">
      <label class="form-label">Card Symbol <span style="font-weight:400;opacity:.6">(LaTeX)</span></label>
      <input class="form-input" id="cls-symbol" value="${escH(symbol)}" oninput="updateSymbolPreview()" placeholder="e.g. x^2 + bx + c" />
      <div class="latex-preview" id="cls-preview">${renderLatex(symbol, false)}</div>
    </div>
    <div class="form-group">
      <label class="form-label">Accent Color</label>
      <div class="color-palette" id="cls-palette">${swatches}</div>
      <input type="hidden" id="cls-accent" value="${accent}" />
    </div>
    <div class="modal-actions">
      ${cls ? `<button class="btn danger" onclick="deleteClass('${classId}');closeModal()">Delete</button>` : ''}
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="saveClass('${classId||''}')">Save</button>
    </div>`);
}
function updateSymbolPreview() {
  const latex = document.getElementById('cls-symbol').value;
  document.getElementById('cls-preview').innerHTML = renderLatex(latex, false);
}
function selectSwatch(el, color) {
  document.querySelectorAll('#cls-palette .color-swatch').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('cls-accent').value = color;
}
function saveClass(classId) {
  const name   = document.getElementById('cls-name').value.trim();
  const symbol = document.getElementById('cls-symbol').value.trim();
  const accent = document.getElementById('cls-accent').value;
  if (!name) { alert('Course name is required.'); return; }
  if (classId) {
    const cls = getClass(classId);
    cls.name = name; cls.symbol = symbol; cls.accent = accent;
  } else {
    data.classes.push({ id:genId(), name, symbol, accent, topics:[] });
  }
  saveData(); closeModal(); renderApp();
}

// ── Topic modal ─────────────────────────────────────────────────
function openTopicModal(topicId=null) {
  const cls = getClass(nav.classId);
  const topic = topicId ? getTopic(cls, topicId) : null;
  const name = topic ? topic.name : '';
  showModal(`
    <h3>${topic ? 'Edit Topic' : 'Add Topic'}</h3>
    <div class="form-group">
      <label class="form-label">Topic Name</label>
      <input class="form-input" id="tp-name" value="${escH(name)}" placeholder="e.g. Quadratics" />
    </div>
    <div class="modal-actions">
      ${topic ? `<button class="btn danger" onclick="deleteTopic('${topicId}');closeModal()">Delete</button>` : ''}
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="saveTopic('${topicId||''}')">Save</button>
    </div>`);
  setTimeout(() => document.getElementById('tp-name').focus(), 50);
}
function saveTopic(topicId) {
  const name = document.getElementById('tp-name').value.trim();
  if (!name) { alert('Topic name is required.'); return; }
  const cls = getClass(nav.classId);
  if (topicId) {
    getTopic(cls, topicId).name = name;
  } else {
    cls.topics.push({ id:genId(), name, formulas:[] });
  }
  saveData(); closeModal(); renderApp();
}

// ── Formula modal ────────────────────────────────────────────────
function openFormulaModal(formulaId=null) {
  const cls   = getClass(nav.classId);
  const topic = getTopic(cls, nav.topicId);
  const f     = formulaId ? topic.formulas.find(x => x.id === formulaId) : null;
  const name  = f ? f.name  : '';
  const latex = f ? f.latex : '';
  const desc  = f ? f.desc  : '';

  showModal(`
    <h3>${f ? 'Edit Formula' : 'Add Formula'}</h3>
    <div class="form-group">
      <label class="form-label">Formula Name</label>
      <input class="form-input" id="fm-name" value="${escH(name)}" placeholder="e.g. Quadratic Formula" />
    </div>
    <div class="form-group">
      <label class="form-label">LaTeX</label>
      <textarea class="form-textarea" id="fm-latex" placeholder="e.g. x = \\frac{-b \\pm \\sqrt{b^2-4ac}}{2a}" oninput="updateFormulaPreview()">${escH(latex)}</textarea>
      <div class="form-hint">Use LaTeX syntax: \\frac{a}{b} · \\sqrt{x} · \\int_a^b · \\sum_{n=0}^{\\infty}</div>
      <div class="latex-preview" id="fm-preview">
        ${latex ? renderLatex(latex, true) : '<span style="color:var(--text-dim);font-size:0.8rem">Preview appears here as you type</span>'}
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Description <span style="font-weight:400;opacity:.55">(optional)</span></label>
      <input class="form-input" id="fm-desc" value="${escH(desc)}" placeholder="Brief note or condition..." />
    </div>
    <div class="modal-actions">
      ${f ? `<button class="btn danger" onclick="deleteFormula('${formulaId}');closeModal()">Delete</button>` : ''}
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="saveFormula('${formulaId||''}')">Save</button>
    </div>`);
  setTimeout(() => document.getElementById('fm-name').focus(), 50);
}
function updateFormulaPreview() {
  const latex = document.getElementById('fm-latex').value;
  document.getElementById('fm-preview').innerHTML = latex
    ? renderLatex(latex, true)
    : '<span style="color:var(--text-dim);font-size:0.8rem">Preview appears here as you type</span>';
}
function saveFormula(formulaId) {
  const name  = document.getElementById('fm-name').value.trim();
  const latex = document.getElementById('fm-latex').value.trim();
  const desc  = document.getElementById('fm-desc').value.trim();
  if (!name || !latex) { alert('Name and LaTeX are required.'); return; }
  const cls   = getClass(nav.classId);
  const topic = getTopic(cls, nav.topicId);
  if (formulaId) {
    const f = topic.formulas.find(x => x.id === formulaId);
    f.name = name; f.latex = latex; f.desc = desc;
  } else {
    topic.formulas.push({ id:genId(), name, latex, desc });
  }
  saveData(); closeModal(); renderApp();
}

// ═══════════════════════════════════════════════════════════════════
//  DELETE OPERATIONS
// ═══════════════════════════════════════════════════════════════════
function deleteClass(classId) {
  if (!confirm('Delete this course and all its topics?')) return;
  data.classes = data.classes.filter(c => c.id !== classId);
  saveData();
  if (nav.classId === classId) { nav = {view:'home',classId:null,topicId:null}; navStack = []; }
  renderApp();
}
function deleteTopic(topicId) {
  if (!confirm('Delete this topic and all its formulas?')) return;
  const cls = getClass(nav.classId);
  cls.topics = cls.topics.filter(t => t.id !== topicId);
  saveData();
  if (nav.topicId === topicId) { nav = {view:'class',classId:nav.classId,topicId:null}; }
  renderApp();
}
function deleteFormula(formulaId) {
  if (!confirm('Delete this formula?')) return;
  const cls   = getClass(nav.classId);
  const topic = getTopic(cls, nav.topicId);
  topic.formulas = topic.formulas.filter(f => f.id !== formulaId);
  saveData(); renderApp();
}

// ═══════════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════════
renderApp();
</script>
</body>
</html>
