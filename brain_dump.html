<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brain Dump — Math Formula Library</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:         #0f1117;
      --surface:    #111827;
      --surface2:   #1f2937;
      --border:     #374151;
      --border-sub: #1f2937;
      --orange:     #f97316;
      --blue:       #3b82f6;
      --text:       #f9fafb;
      --text-muted: #9ca3af;
      --text-dim:   #6b7280;
      --red:        #ef4444;
      --green:      #22c55e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      font-size: 22px;
      min-height: 100vh;
    }

    /* ── Site Nav ── */
    .site-nav {
      width: 100%;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .back-link { color: var(--orange); text-decoration: none; font-size: 0.82rem; font-weight: 500; flex-shrink: 0; }
    .back-link:hover { text-decoration: underline; }
    .site-nav-title { font-size: 0.95rem; font-weight: 700; color: var(--text); }
    .site-nav-sub   { font-size: 0.78rem; color: var(--text-muted); }
    .nav-spacer { flex: 1; }
    .edit-toggle {
      padding: 6px 14px;
      font-size: 0.78rem;
      font-weight: 600;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .edit-toggle:hover { color: var(--text); border-color: #4b5563; }
    .edit-toggle.active { background: rgba(249,115,22,0.12); border-color: var(--orange); color: var(--orange); }

    /* ── App Shell ── */
    #app {
      max-width: 1400px;
      margin: 0 auto;
      padding: 36px 40px 80px;
    }

    /* ── Page heading ── */
    .page-heading { margin-bottom: 28px; }
    .page-title {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.03em;
      margin-bottom: 4px;
    }
    .page-title span { color: var(--orange); }
    .page-subtitle { font-size: 0.88rem; color: var(--text-muted); }

    /* ── Breadcrumb ── */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
      font-size: 0.8rem;
      color: var(--text-dim);
      flex-wrap: wrap;
    }
    .bc-link { color: var(--orange); cursor: pointer; }
    .bc-link:hover { text-decoration: underline; }
    .bc-sep { color: var(--text-dim); }
    .bc-current { color: var(--text); font-weight: 600; }

    /* ── Back button ── */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      font-size: 0.8rem;
      font-weight: 500;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: 22px;
    }
    .back-btn:hover { color: var(--text); border-color: #4b5563; }

    /* ── CLASS GRID ── */
    .class-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 16px;
    }
    .class-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
      position: relative;
    }
    .class-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.45);
      border-color: #4b5563;
    }
    .class-card-header {
      padding: 28px 20px 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100px;
      overflow: hidden;
    }
    .class-card-symbol { color: var(--text); text-align: center; }
    .class-card-symbol .katex { font-size: 1.25em !important; }
    .class-card-body { padding: 12px 16px 16px; }
    .class-card-name { font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .class-card-meta { font-size: 0.74rem; color: var(--text-dim); }

    /* ── TOPIC GRID ── */
    .topic-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 10px;
    }
    .topic-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left-width: 3px;
      border-radius: 10px;
      padding: 16px 16px 16px 18px;
      cursor: pointer;
      transition: background 0.15s, transform 0.12s;
      position: relative;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .topic-card:hover { background: var(--surface2); transform: translateX(3px); }
    .topic-card-body { flex: 1; min-width: 0; }
    .topic-card-name { font-size: 0.93rem; font-weight: 600; color: var(--text); line-height: 1.3; }
    .topic-card-meta { font-size: 0.72rem; color: var(--text-dim); margin-top: 3px; }
    .topic-card-arrow { color: var(--text-dim); font-size: 1rem; flex-shrink: 0; }

    /* ── FORMULA GRID ── */
    .formula-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 16px;
    }
    .formula-card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px 22px;
      position: relative;
      overflow: hidden;
    }
    .formula-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }
    .formula-card-name {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #111827;
      margin-bottom: 14px;
    }
    /* KaTeX overflow fix — applies everywhere display math is rendered.
       KaTeX's em-based sizing renders 1-2px taller than the browser's measured
       box. If the wrapper has overflow-x:auto, the browser forces overflow-y
       to auto too, and those stray pixels trigger a vertical scrollbar that
       clips superscripts. Fix: scroll horizontally on the KaTeX block itself,
       never vertically, and pad so the rounding pixels aren't clipped. */
    .katex-display {
      margin: 0;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 0.4em 0.2em;
    }
    .formula-display {
      text-align: center;
      padding: 6px 0 10px;
      color: #111827;
    }
    .formula-card-desc {
      font-size: 0.95rem;
      color: #111827;
      margin-top: 12px;
      font-style: italic;
      border-top: 1px solid #e5e7eb;
      padding-top: 10px;
      line-height: 1.55;
    }

    /* ── Add card ── */
    .add-card {
      border: 1px dashed var(--border);
      border-radius: 12px;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text-dim);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      padding: 24px;
      transition: all 0.2s;
      min-height: 80px;
    }
    .add-card:hover { border-color: var(--orange); color: var(--orange); background: rgba(249,115,22,0.04); }
    .edit-mode .add-card { display: flex; }

    /* ── Edit overlays ── */
    .card-actions {
      display: none;
      position: absolute;
      top: 8px; right: 8px;
      gap: 4px;
      z-index: 10;
    }
    .edit-mode .card-actions { display: flex; }
    .card-btn {
      width: 26px; height: 26px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem;
      transition: all 0.12s;
    }
    .card-btn:hover { color: var(--text); border-color: #4b5563; }
    .card-btn.del:hover { color: var(--red); border-color: var(--red); background: rgba(239,68,68,0.08); }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.72);
      z-index: 2000;
      align-items: center; justify-content: center;
      padding: 20px;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 32px 80px rgba(0,0,0,0.9);
    }
    .modal h3 { font-size: 1.05rem; font-weight: 700; color: var(--text); margin-bottom: 22px; }
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 0.74rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .form-input, .form-textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 0.9rem;
      padding: 9px 12px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus, .form-textarea:focus { border-color: var(--orange); }
    .form-textarea {
      resize: vertical;
      min-height: 72px;
      font-family: ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace;
      font-size: 0.83rem;
    }
    .form-hint { font-size: 0.71rem; color: var(--text-dim); margin-top: 5px; }
    .latex-preview {
      background: var(--bg);
      border: 1px solid var(--border-sub);
      border-radius: 8px;
      padding: 18px 14px;
      text-align: center;
      min-height: 64px;
      margin-top: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .color-palette { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
    .color-swatch {
      width: 28px; height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.1s, border-color 0.1s;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.selected { border-color: var(--text); }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 24px; flex-wrap: wrap; }
    .btn {
      padding: 8px 18px;
      font-size: 0.82rem; font-weight: 600;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn:hover { color: var(--text); border-color: #4b5563; }
    .btn.primary { background: var(--orange); color: #fff; border-color: var(--orange); }
    .btn.primary:hover { background: #ea6c0a; border-color: #ea6c0a; }
    .btn.danger:hover { background: rgba(239,68,68,0.1); border-color: var(--red); color: var(--red); }

    /* ── Study Modal ── */
    .topic-check-list { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; max-height: 260px; overflow-y: auto; }
    .topic-check-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--surface2); border-radius: 8px; cursor: pointer; border: 1px solid transparent; transition: border-color 0.15s; }
    .topic-check-item:hover { border-color: var(--border); }
    .topic-check-item input[type=checkbox] { accent-color: var(--orange); width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; }
    .topic-check-label { font-size: 0.88rem; color: var(--text); cursor: pointer; flex: 1; }
    .topic-check-meta { font-size: 0.72rem; color: var(--text-dim); white-space: nowrap; }
    .flip-toggle { display: flex; gap: 8px; margin-top: 6px; }
    .flip-option { flex: 1; padding: 10px 8px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text-muted); font-size: 0.78rem; cursor: pointer; text-align: center; transition: all 0.15s; line-height: 1.5; }
    .flip-option:hover { border-color: #4b5563; color: var(--text); }
    .flip-option.selected { border-color: var(--orange); color: var(--orange); background: rgba(249,115,22,0.08); }

    /* ── Study progress ── */
    .study-progress-wrap { margin-bottom: 24px; }
    .study-progress-bar-track { background: var(--surface2); border-radius: 99px; height: 6px; overflow: hidden; margin-bottom: 8px; }
    .study-progress-bar-fill { height: 100%; border-radius: 99px; background: var(--orange); transition: width 0.4s ease; }
    .study-counter { font-size: 0.8rem; color: var(--text-dim); text-align: right; }

    /* ── Flashcard ── */
    .card-scene { perspective: 1200px; width: 100%; max-width: 640px; margin: 0 auto 28px; }
    /* Grid stacking: both faces occupy the same grid cell (1/1), so the card's
       height is always the taller of the two faces — the back is never squeezed
       into an invisible box the size of the front. */
    .card-inner { display: grid; width: 100%; transform-style: preserve-3d; transition: transform 0.55s cubic-bezier(0.4, 0.2, 0.2, 1); }
    .card-inner.is-flipped { transform: rotateY(180deg); }
    .card-face {
      grid-area: 1 / 1;
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      background: #ffffff; border: 1px solid #e5e7eb; border-radius: 18px;
      padding: 48px 36px; min-height: 420px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
    }
    .card-back-face { transform: rotateY(180deg); }
    .card-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: #111827; margin-bottom: 20px; }
    .card-main-text { font-size: 1.2rem; font-weight: 700; color: #111827; line-height: 1.4; }
    .card-main-formula { flex-shrink: 0; width: 100%; color: #111827; }
    .card-desc { font-size: 0.8rem; color: #111827; margin-top: 16px; font-style: italic; }
    .card-tap-hint { font-size: 0.72rem; color: #6b7280; margin-top: 28px; opacity: 0.5; }

    /* ── Grade buttons ── */
    .grade-row { display: flex; gap: 16px; justify-content: center; margin-top: 4px; transition: opacity 0.2s; }
    .grade-row.hidden { opacity: 0; pointer-events: none; }
    .grade-btn { display: flex; align-items: center; gap: 8px; padding: 13px 32px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.18s; color: var(--text-muted); }
    .grade-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
    .grade-btn.correct:hover { background: rgba(34,197,94,0.12); border-color: var(--green); color: var(--green); }
    .grade-btn.wrong:hover { background: rgba(239,68,68,0.1); border-color: var(--red); color: var(--red); }

    /* ── Summary ── */
    .summary-stats { display: flex; gap: 14px; margin-bottom: 28px; flex-wrap: wrap; }
    .stat-box { flex: 1; min-width: 90px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px 16px; text-align: center; }
    .stat-num { font-size: 2rem; font-weight: 800; }
    .stat-label { font-size: 0.72rem; color: var(--text-dim); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.08em; }
    .missed-section-title { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 12px; }
    .missed-list { display: flex; flex-direction: column; gap: 10px; }
    .missed-item { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--red); border-radius: 10px; padding: 14px 16px; }
    .missed-item-name { font-size: 0.85rem; font-weight: 600; color: var(--text); margin-bottom: 10px; }
    .missed-item-formula { text-align: center; }
    .summary-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 28px; }

    /* ── Responsive ── */
    @media (max-width: 580px) {
      #app { padding: 20px 12px 60px; }
      .formula-grid { grid-template-columns: 1fr; }
      .class-grid { grid-template-columns: 1fr; }
      .topic-grid { grid-template-columns: 1fr; }
      .modal { padding: 20px; }
    }
  </style>
</head>
<body>

<nav class="site-nav">
  <a class="back-link" href="index.html">← bychance.dev</a>
  <span class="site-nav-title">Brain Dump</span>
  <span class="site-nav-sub">Math Formula Library</span>
  <div class="nav-spacer"></div>
  <button class="edit-toggle" id="reset-btn" onclick="resetToDefaults()">↺ Reset</button>
  <button class="edit-toggle" id="edit-toggle" onclick="toggleEditMode()">✎ Edit</button>
</nav>

<div id="app"></div>

<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div id="modal-content"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  ACCENT COLORS
// ═══════════════════════════════════════════════════════════════════
const ACCENTS = ['#f97316','#3b82f6','#8b5cf6','#14b8a6','#f59e0b','#f43f5e','#10b981','#ec4899','#6366f1'];

// ═══════════════════════════════════════════════════════════════════
//  DEFAULT DATA  — 6 courses, pre-populated with real formulas
// ═══════════════════════════════════════════════════════════════════
const DEFAULT_DATA = { classes: [

  // ── ALGEBRA ────────────────────────────────────────────────────
  // Organized to mirror the College Algebra lecture notes:
  //   Unit 1 Algebraic Manipulation → Unit 2 Equations & Inequalities →
  //   Unit 3 Functions → Unit 4 Special Functions → Unit 5 Systems of Equations
  // Any pre-existing cards that don't come from those notes live in
  // "Additional Formulas" at the end so nothing was deleted.
  { id:'algebra', name:'Algebra', accent:'#f97316',
    symbol:'x = \\dfrac{-b \\pm \\sqrt{b^2-4ac}}{2a}',
    topics:[

      // Unit 1.1
      { id:'alg-frac', name:'Fractions & Order of Operations', formulas:[
        { id:'af1', name:'GEMDAS Order of Operations', latex:'\\text{G, E, M/D, A/S}',                                              desc:'Grouping, Exponents, Multiplication/Division (L→R), Addition/Subtraction (L→R)' },
        { id:'af2', name:'Multiplying Fractions',       latex:'\\dfrac{a}{b}\\cdot\\dfrac{c}{d} = \\dfrac{ac}{bd}',                 desc:'' },
        { id:'af3', name:'Dividing Fractions',          latex:'\\dfrac{a}{b}\\div\\dfrac{c}{d} = \\dfrac{a}{b}\\cdot\\dfrac{d}{c}', desc:'Multiply by the reciprocal of the divisor' },
      ]},

      // Unit 1.2
      { id:'exponents', name:'Exponent Rules', formulas:[
        { id:'e1', name:'Product Rule',            latex:'a^m \\cdot a^n = a^{m+n}',                                              desc:'' },
        { id:'e2', name:'Quotient Rule',           latex:'\\dfrac{a^m}{a^n} = a^{m-n}',                                           desc:'' },
        { id:'e3', name:'Power Rule',              latex:'(a^m)^n = a^{mn}',                                                       desc:'' },
        { id:'e4', name:'Negative Exponent',       latex:'a^{-n} = \\dfrac{1}{a^n}',                                              desc:'' },
        { id:'e5', name:'Zero Exponent',           latex:'a^0 = 1 \\quad (a \\neq 0)',                                            desc:'' },
        { id:'e6', name:'Rational Exponent',       latex:'a^{m/n} = \\sqrt[n]{a^m}',                                              desc:'' },
      ]},

      // Unit 1.3
      { id:'polynomials', name:'Factoring Formulas', formulas:[
        { id:'p1', name:'Difference of Squares',  latex:'a^2 - b^2 = (a+b)(a-b)',                                                 desc:'' },
        { id:'p2', name:'Perfect Square (sum)',    latex:'(a+b)^2 = a^2 + 2ab + b^2',                                             desc:'' },
        { id:'p3', name:'Perfect Square (diff)',   latex:'(a-b)^2 = a^2 - 2ab + b^2',                                             desc:'' },
        { id:'p4', name:'Sum of Cubes',            latex:'a^3+b^3 = (a+b)(a^2-ab+b^2)',                                           desc:'' },
        { id:'p5', name:'Difference of Cubes',    latex:'a^3-b^3 = (a-b)(a^2+ab+b^2)',                                           desc:'' },
      ]},

      // Unit 1.4
      { id:'alg-radicals', name:'Radicals & Complex Numbers', formulas:[
        { id:'ac1', name:'Imaginary Unit',        latex:'i = \\sqrt{-1} \\qquad i^2 = -1',                                        desc:'' },
        { id:'ac2', name:'Radical Product Rule',  latex:'\\sqrt{ab} = \\sqrt{a}\\,\\sqrt{b}',                                     desc:'' },
        { id:'ac3', name:'Radical Quotient Rule', latex:'\\sqrt{\\dfrac{a}{b}} = \\dfrac{\\sqrt{a}}{\\sqrt{b}}',                  desc:'' },
        { id:'ac4', name:'Complex Conjugate',     latex:'a+bi \\ \\longleftrightarrow\\ a-bi',                                    desc:'Multiply by the conjugate to rationalize a denominator with a complex number' },
      ]},

      // Unit 1.5
      { id:'alg-rational-expr', name:'Rational Expressions', formulas:[
        { id:'re1', name:'Multiplying Rational Expressions', latex:'\\dfrac{A}{B}\\cdot\\dfrac{C}{D} = \\dfrac{AC}{BD}',                       desc:'' },
        { id:'re2', name:'Dividing Rational Expressions',    latex:'\\dfrac{A}{B}\\div\\dfrac{C}{D} = \\dfrac{A}{B}\\cdot\\dfrac{D}{C}',       desc:'' },
      ]},

      // Unit 2.2
      { id:'quadratics', name:'Quadratic Equations', formulas:[

// ═══════════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════════
const STORAGE_KEY = 'brain_dump_data';

// DATA_VERSION controls whether a returning visitor's locally saved data gets
// wiped and replaced with the latest DEFAULT_DATA above.
//
// HOW IT WORKS: When someone visits the site, their browser saves a copy of all
// the courses/topics/formulas to localStorage (including anything they added via
// the Edit button). On future visits, the site loads from that saved copy instead
// of the code — which means updates to DEFAULT_DATA are ignored for that person.
//
// THE FIX: We store a version number alongside the saved data. If the number in
// the code (DATA_VERSION) doesn't match the saved number, we discard the old
// saved data and load fresh from DEFAULT_DATA.
//
// IMPORTANT: Any time you add, remove, or change courses/topics/formulas in
// DEFAULT_DATA above and want returning visitors to see the changes, bump
// DATA_VERSION by 1 before deploying. This will wipe any edits users made
// themselves via the Edit button — acceptable for now, but worth knowing.
const DATA_VERSION = 2;

let data      = loadData();
let navStack  = [];                              // history for back-button
let nav       = { view:'home', classId:null, topicId:null };
let editMode  = false;

// ═══════════════════════════════════════════════════════════════════
//  STUDY SESSION STATE
// ═══════════════════════════════════════════════════════════════════
let study = {
  queue:      [],        // [{formula, topicName, cls}] — grows as wrong cards reinsert
  index:      0,         // current position in queue
  flipped:    false,
  wrongCount: 0,         // cumulative 👎 presses — counts duplicates
  missedIds:  new Set(), // unique formula IDs missed at least once (for review list)
  mode:       'name',    // 'name' = show name → recall formula | 'formula' = show formula → recall name
  totalCards: 0,         // original deck size (before any reinsertions)
};

// ═══════════════════════════════════════════════════════════════════
//  PERSISTENCE
// ═══════════════════════════════════════════════════════════════════
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      if (saved.version === DATA_VERSION) return saved.data;
      // Version mismatch — the code has been updated with new content.
      // Discard the old saved data and fall through to load fresh DEFAULT_DATA.
    }
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_DATA)); // deep clone
}
function saveData() {
  // Always save with the current version number so we can detect stale data on future visits.
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ version: DATA_VERSION, data: data }));
}

// ═══════════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════════
function escH(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function genId() { return 'x' + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function renderLatex(latex, display=true) {
  try {
    return katex.renderToString(latex||'', { displayMode:display, throwOnError:false, errorColor:'#ef4444' });
  } catch(e) {
    return `<span style="color:#ef4444;font-size:0.8rem">${escH(latex)}</span>`;
  }
}
function getClass(id) { return data.classes.find(c => c.id === id); }
function getTopic(cls, id) { return cls.topics.find(t => t.id === id); }

// ═══════════════════════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════════════════════
function navigateTo(view, classId=null, topicId=null) {
  navStack.push({ ...nav });
  nav = { view, classId, topicId };
  renderApp();
  window.scrollTo(0, 0);
}
function goBack() {
  if (navStack.length === 0) return;
  nav = navStack.pop();
  renderApp();
  window.scrollTo(0, 0);
}
function toggleEditMode() {
  editMode = !editMode;
  document.getElementById('edit-toggle').classList.toggle('active', editMode);
  document.getElementById('app').classList.toggle('edit-mode', editMode);
}
function resetToDefaults() {
  if (!confirm('Reset everything to the original courses, topics, and formulas? Any custom changes you\'ve made will be lost.')) return;
  data = JSON.parse(JSON.stringify(DEFAULT_DATA)); // deep clone so DEFAULT_DATA stays untouched
  saveData();
  nav = { view: 'home', classId: null, topicId: null };
  navStack = [];
  renderApp();
}

// ═══════════════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════════════
function renderApp() {
  const el = document.getElementById('app');
  el.classList.toggle('edit-mode', editMode);
  if (nav.view === 'home')  renderHome();
  if (nav.view === 'class') renderClass();
  if (nav.view === 'topic') renderTopic();
  if (nav.view === 'study') renderStudy();
}

    <div class="page-heading">
      <div class="page-title">Brain <span>Dump</span></div>
      <div class="page-subtitle">Select a course to browse formula topics</div>
    </div>
    <div class="class-grid">`;

  data.classes.forEach(cls => {
    html += `
      <div class="class-card" onclick="navigateTo('class','${cls.id}')"
           style="border-color:${cls.accent}30">
        <div class="card-actions">
          <button class="card-btn" title="Edit" onclick="event.stopPropagation();openClassModal('${cls.id}')">✎</button>
          <button class="card-btn del" title="Delete" onclick="event.stopPropagation();deleteClass('${cls.id}')">✕</button>
        </div>

        </div>

// ── Topic: formula cards ─────────────────────────────────────────

// ═══════════════════════════════════════════════════════════════════
//  MODALS
// ═══════════════════════════════════════════════════════════════════
function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}
function showModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('show');
}

// ── Class modal ─────────────────────────────────────────────────
function openClassModal(classId=null) {
  const cls = classId ? getClass(classId) : null;
  const name = cls ? cls.name : '';
  const symbol = cls ? cls.symbol : 'x^2';
  const accent = cls ? cls.accent : ACCENTS[0];

  const swatches = ACCENTS.map(c =>
    `<div class="color-swatch${c===accent?' selected':''}" style="background:${c}"
         onclick="selectSwatch(this,'${c}')"></div>`
  ).join('');

  showModal(`
    <h3>${cls ? 'Edit Course' : 'Add Course'}</h3>
    <div class="form-group">
      <label class="form-label">Course Name</label>
      <input class="form-input" id="cls-name" value="${escH(name)}" placeholder="e.g. Algebra" />
    </div>
    <div class="form-group">
      <label class="form-label">Card Symbol <span style="font-weight:400;opacity:.6">(LaTeX)</span></label>
      <input class="form-input" id="cls-symbol" value="${escH(symbol)}" oninput="updateSymbolPreview()" placeholder="e.g. x^2 + bx + c" />
      <div class="latex-preview" id="cls-preview">${renderLatex(symbol, false)}</div>
    </div>
    <div class="form-group">
      <label class="form-label">Accent Color</label>
      <div class="color-palette" id="cls-palette">${swatches}</div>
      <input type="hidden" id="cls-accent" value="${accent}" />
    </div>
    <div class="modal-actions">
      ${cls ? `<button class="btn danger" onclick="deleteClass('${classId}');closeModal()">Delete</button>` : ''}
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="saveClass('${classId||''}')">Save</button>
    </div>`);
}
function updateSymbolPreview() {
  const latex = document.getElementById('cls-symbol').value;
  document.getElementById('cls-preview').innerHTML = renderLatex(latex, false);
}
function selectSwatch(el, color) {
  document.querySelectorAll('#cls-palette .color-swatch').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('cls-accent').value = color;
}
function saveClass(classId) {
  const name   = document.getElementById('cls-name').value.trim();
  const symbol = document.getElementById('cls-symbol').value.trim();
  const accent = document.getElementById('cls-accent').value;
  if (!name) { alert('Course name is required.'); return; }
  if (classId) {
    const cls = getClass(classId);
    cls.name = name; cls.symbol = symbol; cls.accent = accent;
  } else {
    data.classes.push({ id:genId(), name, symbol, accent, topics:[] });
  }
  saveData(); closeModal(); renderApp();
}

// ── Topic modal ─────────────────────────────────────────────────
function openTopicModal(topicId=null) {
  const cls = getClass(nav.classId);
  const topic = topicId ? getTopic(cls, topicId) : null;
  const name = topic ? topic.name : '';
  showModal(`
    <h3>${topic ? 'Edit Topic' : 'Add Topic'}</h3>
    <div class="form-group">
      <label class="form-label">Topic Name</label>
      <input class="form-input" id="tp-name" value="${escH(name)}" placeholder="e.g. Quadratics" />
    </div>
    <div class="modal-actions">
      ${topic ? `<button class="btn danger" onclick="deleteTopic('${topicId}');closeModal()">Delete</button>` : ''}
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="saveTopic('${topicId||''}')">Save</button>
    </div>`);
  setTimeout(() => document.getElementById('tp-name').focus(), 50);
}
function saveTopic(topicId) {
  const name = document.getElementById('tp-name').value.trim();
  if (!name) { alert('Topic name is required.'); return; }
  const cls = getClass(nav.classId);
  if (topicId) {
    getTopic(cls, topicId).name = name;
  } else {
    cls.topics.push({ id:genId(), name, formulas:[] });
  }
  saveData(); closeModal(); renderApp();
}

// ── Formula modal ────────────────────────────────────────────────
function openFormulaModal(formulaId=null) {
  const cls   = getClass(nav.classId);
  const topic = getTopic(cls, nav.topicId);
  const f     = formulaId ? topic.formulas.find(x => x.id === formulaId) : null;
  const name  = f ? f.name  : '';
  const latex = f ? f.latex : '';
  const desc  = f ? f.desc  : '';

  showModal(`
    <h3>${f ? 'Edit Formula' : 'Add Formula'}</h3>
    <div class="form-group">
      <label class="form-label">Formula Name</label>
      <input class="form-input" id="fm-name" value="${escH(name)}" placeholder="e.g. Quadratic Formula" />
    </div>
    <div class="form-group">
      <label class="form-label">LaTeX</label>
      <textarea class="form-textarea" id="fm-latex" placeholder="e.g. x = \\frac{-b \\pm \\sqrt{b^2-4ac}}{2a}" oninput="updateFormulaPreview()">${escH(latex)}</textarea>
      <div class="form-hint">Use LaTeX syntax: \\frac{a}{b} · \\sqrt{x} · \\int_a^b · \\sum_{n=0}^{\\infty}</div>
      <div class="latex-preview" id="fm-preview">
        ${latex ? renderLatex(latex, true) : '<span style="color:var(--text-dim);font-size:0.8rem">Preview appears here as you type</span>'}
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Description <span style="font-weight:400;opacity:.55">(optional)</span></label>
      <input class="form-input" id="fm-desc" value="${escH(desc)}" placeholder="Brief note or condition..." />
    </div>
    <div class="modal-actions">
      ${f ? `<button class="btn danger" onclick="deleteFormula('${formulaId}');closeModal()">Delete</button>` : ''}
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="saveFormula('${formulaId||''}')">Save</button>
    </div>`);
  setTimeout(() => document.getElementById('fm-name').focus(), 50);
}
function updateFormulaPreview() {
  const latex = document.getElementById('fm-latex').value;
  document.getElementById('fm-preview').innerHTML = latex
    ? renderLatex(latex, true)
    : '<span style="color:var(--text-dim);font-size:0.8rem">Preview appears here as you type</span>';
}
function saveFormula(formulaId) {
  const name  = document.getElementById('fm-name').value.trim();
  const latex = document.getElementById('fm-latex').value.trim();
  const desc  = document.getElementById('fm-desc').value.trim();
  if (!name || !latex) { alert('Name and LaTeX are required.'); return; }
  const cls   = getClass(nav.classId);
  const topic = getTopic(cls, nav.topicId);
  if (formulaId) {
    const f = topic.formulas.find(x => x.id === formulaId);
    f.name = name; f.latex = latex; f.desc = desc;
  } else {
    topic.formulas.push({ id:genId(), name, latex, desc });
  }
  saveData(); closeModal(); renderApp();
}

// ═══════════════════════════════════════════════════════════════════
//  DELETE OPERATIONS
// ═══════════════════════════════════════════════════════════════════
function deleteClass(classId) {
  if (!confirm('Delete this course and all its topics?')) return;
  data.classes = data.classes.filter(c => c.id !== classId);
  saveData();
  if (nav.classId === classId) { nav = {view:'home',classId:null,topicId:null}; navStack = []; }
  renderApp();
}
function deleteTopic(topicId) {
  if (!confirm('Delete this topic and all its formulas?')) return;
  const cls = getClass(nav.classId);
  cls.topics = cls.topics.filter(t => t.id !== topicId);
  saveData();
  if (nav.topicId === topicId) { nav = {view:'class',classId:nav.classId,topicId:null}; }
  renderApp();
}
function deleteFormula(formulaId) {
  if (!confirm('Delete this formula?')) return;
  const cls   = getClass(nav.classId);
  const topic = getTopic(cls, nav.topicId);
  topic.formulas = topic.formulas.filter(f => f.id !== formulaId);
  saveData(); renderApp();
}

function startStudySession(classId) {
  const cls        = getClass(classId);
  const checkedIds = [...document.querySelectorAll('.study-topic-cb:checked')].map(cb => cb.value);
  const mode       = document.getElementById('mode-formula').classList.contains('selected') ? 'formula' : 'name';

  if (checkedIds.length === 0) { alert('Select at least one topic.'); return; }

  let queue = [];
  checkedIds.forEach(topicId => {
    const topic = getTopic(cls, topicId);
    if (topic) topic.formulas.forEach(f => queue.push({ formula: f, topicName: topic.name, cls }));
  });

  if (queue.length === 0) { alert('No formulas found in selected topics.'); return; }

  // Fisher-Yates shuffle
  for (let i = queue.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [queue[i], queue[j]] = [queue[j], queue[i]];
  }

  study.queue      = queue;
  study.index      = 0;
  study.flipped    = false;
  study.wrongCount = 0;
  study.missedIds  = new Set();
  study.mode       = mode;
  study.totalCards = queue.length;

  closeModal();
  navigateTo('study', classId);
}

function renderStudy() {
  const cls = getClass(nav.classId);

  // Session complete?
  if (study.index >= study.queue.length) { renderStudySummary(); return; }

  const item        = study.queue[study.index];
  const { formula } = item;
  const total       = study.queue.length;
  const current     = study.index + 1;
  const pct         = Math.round((study.index / total) * 100);

  let frontLabel, frontContent, backLabel, backContent;
  if (study.mode === 'name') {
    frontLabel   = 'What is the formula for…';
    frontContent = `<div class="card-main-text">${escH(formula.name)}</div>`;
    backLabel    = formula.name;
    backContent  = `<div class="card-main-formula">${renderLatex(formula.latex, true)}</div>
                    ${formula.desc ? `<div class="card-desc">${escH(formula.desc)}</div>` : ''}`;
  } else {
    frontLabel   = 'What is this formula called?';
    frontContent = `<div class="card-main-formula">${renderLatex(formula.latex, true)}</div>`;
    backLabel    = 'Answer';
    backContent  = `<div class="card-main-text">${escH(formula.name)}</div>
                    ${formula.desc ? `<div class="card-desc">${escH(formula.desc)}</div>` : ''}`;
  }

  const flipped = study.flipped;

  document.getElementById('app').innerHTML = `
    <div class="breadcrumb">
      <span class="bc-link" onclick="navigateTo('home')">All Courses</span>
      <span class="bc-sep">›</span>
      <span class="bc-link" onclick="exitStudy()">${escH(cls.name)}</span>
      <span class="bc-sep">›</span>
      <span class="bc-current">Study Session</span>
    </div>
    <div class="study-progress-wrap">
      <div class="study-progress-bar-track">
        <div class="study-progress-bar-fill" style="width:${pct}%"></div>
      </div>
      <div class="study-counter">Card ${current} of ${total}</div>
    </div>
    <div class="card-scene">
      <div class="card-inner${flipped ? ' is-flipped' : ''}" id="study-card" onclick="flipCard()">
        <div class="card-face" style="border-top:3px solid ${cls.accent}">
          <div class="card-label">${escH(frontLabel)}</div>
          ${frontContent}
          <div class="card-tap-hint">click to flip</div>
        </div>
        <div class="card-face card-back-face" style="border-top:3px solid ${cls.accent}">
          <div class="card-label">${escH(backLabel)}</div>
          ${backContent}
        </div>
      </div>
    </div>
    <div class="grade-row${flipped ? '' : ' hidden'}" id="grade-row">
      <button class="grade-btn wrong" onclick="gradeCard(false)">👎 Missed it</button>
      <button class="grade-btn correct" onclick="gradeCard(true)">👍 Got it</button>
    </div>`;

}

function flipCard() {
  study.flipped = !study.flipped;
  const card     = document.getElementById('study-card');
  const gradeRow = document.getElementById('grade-row');
  if (card)     card.classList.toggle('is-flipped', study.flipped);
  if (gradeRow) gradeRow.classList.toggle('hidden', !study.flipped);
}

function gradeCard(correct) {
  const item = study.queue[study.index];

  if (!correct) {
    study.wrongCount++;                    // always increment — counts duplicates
    study.missedIds.add(item.formula.id);  // set deduplicates for the review list
    // Spaced repetition lite: reinsert card 3 positions ahead
    const insertAt = Math.min(study.index + 3, study.queue.length);
    study.queue.splice(insertAt, 0, { ...item });
  }

  study.index++;
  study.flipped = false;
  renderStudy();
}

function exitStudy() {
  if (!confirm('Exit study session?')) return;
  goBack();
}

function renderStudySummary() {
  const cls         = getClass(nav.classId);
  const missedIds   = study.missedIds;
  const total       = study.totalCards;
  const firstTry    = total - missedIds.size; // formulas never missed

  // Collect one item per missed formula for the review list
  const seen = new Set();
  const missedItems = study.queue.filter(item => {
    if (missedIds.has(item.formula.id) && !seen.has(item.formula.id)) {
      seen.add(item.formula.id);
      return true;
    }
    return false;
  });

  const pct        = total > 0 ? firstTry / total : 1;
  const scoreColor = pct >= 0.8 ? 'var(--green)' : pct >= 0.5 ? 'var(--orange)' : 'var(--red)';

  const missedHtml = missedItems.length > 0
    ? `<div class="missed-section-title">Formulas to review (${missedItems.length})</div>
       <div class="missed-list">
         ${missedItems.map(item => `
           <div class="missed-item">
             <div class="missed-item-name">${escH(item.formula.name)}</div>
             <div class="missed-item-formula">${renderLatex(item.formula.latex, true)}</div>
             ${item.formula.desc ? `<div class="card-desc" style="text-align:center;margin-top:8px">${escH(item.formula.desc)}</div>` : ''}
           </div>`).join('')}
       </div>`
    : `<p style="color:var(--green);font-size:0.95rem;text-align:center;padding:24px 0">🎉 Perfect score — all formulas correct!</p>`;

  document.getElementById('app').innerHTML = `
    <div class="breadcrumb">
      <span class="bc-link" onclick="navigateTo('home')">All Courses</span>
      <span class="bc-sep">›</span>
      <span class="bc-link" onclick="navigateTo('class','${cls.id}')">${escH(cls.name)}</span>
      <span class="bc-sep">›</span>
      <span class="bc-current">Session Complete</span>
    </div>
    <div class="page-heading">
      <div class="page-title">Session <span>Complete</span></div>
      <div class="page-subtitle">${escH(cls.name)}</div>
    </div>
    <div class="summary-stats">
      <div class="stat-box">
        <div class="stat-num" style="color:${scoreColor}">${firstTry}</div>
        <div class="stat-label">First Try</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" style="color:var(--red)">${study.wrongCount}</div>
        <div class="stat-label">Total Misses</div>
      </div>
      <div class="stat-box">
        <div class="stat-num">${total}</div>
        <div class="stat-label">Cards</div>
      </div>
    </div>
    ${missedHtml}
    <div class="summary-actions">
      <button class="btn" onclick="navigateTo('class','${cls.id}')">← Back to Topics</button>
      ${missedItems.length > 0 ? `<button class="btn primary" onclick="retryMissed()">↺ Retry Missed (${missedItems.length})</button>` : ''}
    </div>`;
}

function retryMissed() {
  const missedIds = study.missedIds;
  const seen      = new Set();
  const missedItems = study.queue.filter(item => {
    if (missedIds.has(item.formula.id) && !seen.has(item.formula.id)) {
      seen.add(item.formula.id);
      return true;
    }
    return false;
  });

  const queue = [...missedItems];
  for (let i = queue.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [queue[i], queue[j]] = [queue[j], queue[i]];
  }

  study.queue      = queue;
  study.index      = 0;
  study.flipped    = false;
  study.wrongCount = 0;
  study.missedIds  = new Set();
  study.totalCards = queue.length;
  // mode stays the same

  renderStudy();
}

// ═══════════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════════
renderApp();
</script>
